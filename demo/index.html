<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>六一儿童节快乐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 粒子背景 -->
  <div class="particles" id="particles"></div>

  <!-- 贺卡主体 -->
  <div class="card" id="card">
    <div class="decor top-left">🌈</div>
    <div class="decor top-right">🎈</div>
    <div class="decor bottom-left">🍭</div>
    <div class="decor bottom-right">🎁</div>

    <!-- 标题区域 -->
    <div class="title-section">
      <div class="title-icon">🎠</div>
      <h1 class="main-title">Happy Children's Day</h1>
      <p class="sub-title">六一儿童节快乐</p>
    </div>

    <!-- 点击提示 -->
    <p class="tap-hint" id="tapHint">👆 点击查看寄语</p>

    <!-- 寄语内容 -->
    <div class="message-section" id="messageSection">
      <div class="message-box">
        <h2 class="message-title">致我的四位小伙伴</h2>
        <div class="message-content">
          <!-- 【文案修改位置 START】 -->
          亲爱的兄弟们：

          一路走来，没有惊心动魄的故事，更多是假期里相伴的日常。一起出门觅食，坐在一起开黑娱乐，不用刻意寒暄，相处起来格外舒服。大家在外各自努力，为生活和目标往前走，但只要凑到一块儿，就能卸下所有压力，变回无忧无虑的样子。很庆幸身边一直有你们这群伙伴，祝大家六一节日快乐，前路顺遂，咱们的情谊一直不变。
          节日快乐，我的兄弟姐妹们！
          <!-- 【文案修改位置 END】 -->
        </div>
        <p class="message-signature">—— 永远的伙伴</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
